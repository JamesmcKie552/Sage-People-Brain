name: Competitor Intel Sweep

on:
  schedule:
    - cron: '0 8 * * 1'   # Every Monday at 08:00 UTC
  workflow_dispatch:       # Allow manual trigger from GitHub Actions UI

jobs:
  sweep:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic python-dotenv

      - name: Run competitor sweep
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python competitor_sweep.py

      - name: Commit updated intel file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/competitor_intel.json
          git diff --cached --quiet || git commit -m "chore: weekly competitor intel sweep [skip ci]"
          git push
